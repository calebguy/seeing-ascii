<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect width='1' height='1' fill='%23000'/></svg>">
  <title>seeing-ascii</title>
  <meta name="description" content="ascii all I see">
  <meta property="og:title" content="seeing-ascii">
  <meta property="og:description" content="ascii all I see">
  <meta property="og:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/seeing-ascii-edited_c7hcwy.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="675">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="seeing-ascii">
  <meta name="twitter:description" content="ascii all I see">
  <meta name="twitter:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/seeing-ascii-edited_c7hcwy.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #c8c8d0;
      font-family: monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      touch-action: none;
    }

    #ascii-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #ascii-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

#fps-counter {
      position: fixed;
      top: 8px;
      right: 12px;
      font-size: 0.7rem;
      color: #444;
      z-index: 10;
    }

#screenshot-btn {
      display: none;
      position: fixed;
      z-index: 20;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

#screenshot-btn:active {
      background: rgba(255,255,255,0.4);
    }

    #screenshot-btn { display: block; }

    video { display: none; }
    #sample-canvas { display: none; }
  </style>
</head>
<body>

<div id="ascii-container">
  <canvas id="ascii-canvas"></canvas>
<div id="fps-counter"></div>
  <button id="screenshot-btn" aria-label="Take screenshot"></button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="sample-canvas"></canvas>

<script>
const charset = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';

const video = document.getElementById('video');
const sampleCanvas = document.getElementById('sample-canvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
const asciiCanvas = document.getElementById('ascii-canvas');
const outCtx = asciiCanvas.getContext('2d');
const fpsCounter = document.getElementById('fps-counter');

const isMobile = window.matchMedia('(max-width: 768px), (hover: none)').matches;
let cols = isMobile ? 60 : 80;
let mirror = true;
let running = false;
let frameCount = 0;
let lastFpsTime = performance.now();

const FONT_FAMILY = 'Courier New, Courier, monospace';
let charW, charH, fontSize;

function measureFont(size) {
  fontSize = size;
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  charW = outCtx.measureText('M').width;
  charH = fontSize * 0.7;
}

const colsMin = 40;
const colsMax = isMobile ? 200 : 300;

// Scroll wheel to change resolution on desktop
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  const step = e.deltaY > 0 ? 5 : -5;
  cols = Math.round(Math.max(colsMin, Math.min(colsMax, cols + step)));
}, { passive: false });

// Pinch to change resolution on mobile
let pinchStartDist = 0;
let pinchStartCols = cols;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    pinchStartDist = getPinchDist(e.touches);
    pinchStartCols = cols;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = getPinchDist(e.touches);
    const scale = dist / pinchStartDist;
    cols = Math.round(Math.max(colsMin, Math.min(colsMax, pinchStartCols / scale)));
  }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    toggleCamera();
  }
});

let facingMode = 'user';

async function startCamera() {
  // Stop existing tracks
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    mirror = (facingMode === 'user');
    if (!running) {
      running = true;
      requestAnimationFrame(render);
    }
  } catch (err) {
    console.error('Camera access denied:', err);
  }
}

function toggleCamera() {
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  startCamera();
}

// Double-tap to toggle camera on mobile (suppressed after pinch)
let lastTap = 0;
let wasPinching = false;

document.addEventListener('touchstart', (e) => {
  if (e.touches.length >= 2) wasPinching = true;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (e.touches.length === 0 && wasPinching) {
    wasPinching = false;
    lastTap = 0;
    return;
  }
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
    toggleCamera();
    lastTap = 0;
  } else {
    lastTap = now;
  }
});

const screenshotBtn = document.getElementById('screenshot-btn');

// Position button (restore from localStorage or default to bottom-right)
const savedBtn = localStorage.getItem('screenshotBtnPos');
let btnX = savedBtn ? JSON.parse(savedBtn).x : window.innerWidth - 48 - 20;
let btnY = savedBtn ? JSON.parse(savedBtn).y : window.innerHeight - 48 - 24;
screenshotBtn.style.left = btnX + 'px';
screenshotBtn.style.top = btnY + 'px';

// Draggable logic
let btnDragging = false;
let btnDragged = false;
let btnTouchId = null;
let btnStartX, btnStartY, btnOrigX, btnOrigY;

screenshotBtn.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  btnTouchId = t.identifier;
  btnStartX = t.clientX;
  btnStartY = t.clientY;
  btnOrigX = btnX;
  btnOrigY = btnY;
  btnDragging = true;
  btnDragged = false;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  if (!btnDragging) return;
  for (let i = 0; i < e.touches.length; i++) {
    if (e.touches[i].identifier === btnTouchId) {
      const t = e.touches[i];
      const dx = t.clientX - btnStartX;
      const dy = t.clientY - btnStartY;
      if (!btnDragged && Math.abs(dx) + Math.abs(dy) > 8) btnDragged = true;
      if (btnDragged) {
        btnX = Math.max(0, Math.min(window.innerWidth - 48, btnOrigX + dx));
        btnY = Math.max(0, Math.min(window.innerHeight - 48, btnOrigY + dy));
        screenshotBtn.style.left = btnX + 'px';
        screenshotBtn.style.top = btnY + 'px';
      }
      break;
    }
  }
}, { passive: true });

window.addEventListener('touchend', (e) => {
  if (!btnDragging) return;
  let found = false;
  for (let i = 0; i < e.touches.length; i++) {
    if (e.touches[i].identifier === btnTouchId) { found = true; break; }
  }
  if (!found) {
    if (!btnDragged) takeScreenshot();
    else localStorage.setItem('screenshotBtnPos', JSON.stringify({ x: btnX, y: btnY }));
    btnDragging = false;
    btnTouchId = null;
  }
});

screenshotBtn.addEventListener('mousedown', (e) => {
  btnStartX = e.clientX;
  btnStartY = e.clientY;
  btnOrigX = btnX;
  btnOrigY = btnY;
  btnDragging = true;
  btnDragged = false;
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!btnDragging || btnTouchId !== null) return;
  const dx = e.clientX - btnStartX;
  const dy = e.clientY - btnStartY;
  if (!btnDragged && Math.abs(dx) + Math.abs(dy) > 4) btnDragged = true;
  if (btnDragged) {
    btnX = Math.max(0, Math.min(window.innerWidth - 48, btnOrigX + dx));
    btnY = Math.max(0, Math.min(window.innerHeight - 48, btnOrigY + dy));
    screenshotBtn.style.left = btnX + 'px';
    screenshotBtn.style.top = btnY + 'px';
  }
});

window.addEventListener('mouseup', () => {
  if (!btnDragging || btnTouchId !== null) return;
  if (!btnDragged) takeScreenshot();
  else localStorage.setItem('screenshotBtnPos', JSON.stringify({ x: btnX, y: btnY }));
  btnDragging = false;
});

function takeScreenshot() {
  asciiCanvas.toBlob((blob) => {
    const file = new File([blob], 'seeing-ascii.png', { type: 'image/png' });
    if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'seeing-ascii.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }
  }, 'image/png');
}

startCamera();

function render() {
  if (!running) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(render); return; }

  const screenW = window.innerWidth * devicePixelRatio;
  const screenH = window.innerHeight * devicePixelRatio;
  const videoAspect = vw / vh;

  const targetFontSize = Math.max(4, Math.floor(screenW / cols / 0.6));
  measureFont(targetFontSize);

  const cellAspect = charW / charH;

  const wA = Math.ceil(screenW / charW);
  const hA = Math.ceil(wA * cellAspect / videoAspect);
  const hB = Math.ceil(screenH / charH);
  const wB = Math.ceil(hB * videoAspect / cellAspect);

  let w, h;
  if (hA * charH >= screenH) { w = wA; h = hA; }
  else { w = wB; h = hB; }

  if (asciiCanvas.width !== screenW || asciiCanvas.height !== screenH) {
    asciiCanvas.width = screenW;
    asciiCanvas.height = screenH;
  }

  sampleCanvas.width = w;
  sampleCanvas.height = h;
  if (mirror) {
    sampleCtx.translate(w, 0);
    sampleCtx.scale(-1, 1);
  }
  sampleCtx.drawImage(video, 0, 0, w, h);
  if (mirror) sampleCtx.setTransform(1, 0, 0, 1, 0, 0);

  const imageData = sampleCtx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const len = charset.length;

  outCtx.fillStyle = '#0a0a0f';
  outCtx.fillRect(0, 0, screenW, screenH);
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  outCtx.textBaseline = 'top';

  const offsetX = (screenW - w * charW) / 2;
  const offsetY = (screenH - h * charH) / 2;

  for (let y = 0; y < h; y++) {
    const py = offsetY + y * charH;
    if (py + charH < 0 || py > screenH) continue;
    for (let x = 0; x < w; x++) {
      const px = offsetX + x * charW;
      if (px + charW < 0 || px > screenW) continue;
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const charIdx = Math.floor(brightness * (len - 1));
      const ch = charset[charIdx];
      if (ch === ' ') continue;

      outCtx.fillStyle = `rgb(${r},${g},${b})`;
      outCtx.fillText(ch, px, py);
    }
  }

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsCounter.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(render);
}
</script>

</body>
</html>
