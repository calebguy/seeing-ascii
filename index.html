<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'><rect width='1' height='1' fill='%23000'/></svg>">
  <title>seeing-ascii</title>
  <meta name="description" content="ascii all I see">
  <meta property="og:title" content="seeing-ascii">
  <meta property="og:description" content="ascii all I see">
  <meta property="og:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/seeing-ascii-edited_c7hcwy.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="675">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="seeing-ascii">
  <meta name="twitter:description" content="ascii all I see">
  <meta name="twitter:image" content="https://res.cloudinary.com/dm9gwanrg/image/upload/v1772926379/seeing-ascii-edited_c7hcwy.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="ascii-container">
  <canvas id="ascii-canvas"></canvas>
<div id="fps-counter"></div>
  <button id="screenshot-btn" aria-label="Take screenshot"></button>
  <button id="rotate-btn" aria-label="Rotate camera"><svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"></path><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"></path></svg></button>
</div>

<div id="camera-prompt">
  <p id="camera-prompt-text">accept camera perms for ascii ☉ ‿ ⚆</p>
  <button id="retry-btn" style="display:none;">try again</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="sample-canvas"></canvas>

<script>
const charset = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';

const video = document.getElementById('video');
const sampleCanvas = document.getElementById('sample-canvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
const asciiCanvas = document.getElementById('ascii-canvas');
const outCtx = asciiCanvas.getContext('2d');
const fpsCounter = document.getElementById('fps-counter');

const isMobile = window.matchMedia('(max-width: 768px), (hover: none)').matches;
let cols = isMobile ? 60 : 80;
let mirror = true;
let running = false;
let frameCount = 0;
let lastFpsTime = performance.now();

const FONT_FAMILY = 'Courier New, Courier, monospace';
let charW, charH, fontSize;

function measureFont(size) {
  fontSize = size;
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  charW = outCtx.measureText('M').width;
  charH = fontSize * 0.7;
}

const colsMin = 40;
const colsMax = isMobile ? 200 : 300;

// Scroll wheel to change resolution on desktop
document.addEventListener('wheel', (e) => {
  e.preventDefault();
  const step = e.deltaY > 0 ? 5 : -5;
  cols = Math.round(Math.max(colsMin, Math.min(colsMax, cols + step)));
}, { passive: false });

// Pinch to change resolution on mobile
let pinchStartDist = 0;
let pinchStartCols = cols;

function getPinchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    pinchStartDist = getPinchDist(e.touches);
    pinchStartCols = cols;
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = getPinchDist(e.touches);
    const scale = dist / pinchStartDist;
    cols = Math.round(Math.max(colsMin, Math.min(colsMax, pinchStartCols / scale)));
  }
}, { passive: false });

document.addEventListener('keydown', (e) => {
  if (e.key === 'c' || e.key === 'C') {
    toggleCamera();
  }
});

let facingMode = 'user';
const cameraPrompt = document.getElementById('camera-prompt');
const cameraPromptText = document.getElementById('camera-prompt-text');
const retryBtn = document.getElementById('retry-btn');

retryBtn.addEventListener('click', () => startCamera());

async function startCamera() {
  retryBtn.style.display = 'none';
  cameraPromptText.textContent = 'accept camera perms for ascii ☉ ‿ ⚆';
  cameraPrompt.style.display = 'flex';
  // Stop existing tracks
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    mirror = (facingMode === 'user');
    cameraPrompt.style.display = 'none';
    if (!running) {
      running = true;
      requestAnimationFrame(render);
    }
  } catch (err) {
    console.error('Camera access denied:', err);
    cameraPromptText.textContent = 'camera denied ☉ _ ⚆';
    retryBtn.style.display = 'block';
  }
}

function toggleCamera() {
  facingMode = (facingMode === 'user') ? 'environment' : 'user';
  startCamera();
}

// Double-tap to toggle camera on mobile (suppressed after pinch)
let lastTap = 0;
let wasPinching = false;

document.addEventListener('touchstart', (e) => {
  if (e.touches.length >= 2) wasPinching = true;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (e.touches.length === 0 && wasPinching) {
    wasPinching = false;
    lastTap = 0;
    return;
  }
  if (e.touches.length > 0) return;
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
    toggleCamera();
    lastTap = 0;
  } else {
    lastTap = now;
  }
});

const screenshotBtn = document.getElementById('screenshot-btn');


// Click/tap to screenshot (no drag)
screenshotBtn.addEventListener('click', () => takeScreenshot());
screenshotBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  takeScreenshot();
});

// Rotate camera button
const rotateBtn = document.getElementById('rotate-btn');
rotateBtn.addEventListener('click', () => toggleCamera());
rotateBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  toggleCamera();
});

function takeScreenshot() {
  const now = new Date();
  const ts = now.getFullYear() + '-'
    + String(now.getMonth() + 1).padStart(2, '0') + '-'
    + String(now.getDate()).padStart(2, '0') + '-'
    + String(now.getHours()).padStart(2, '0')
    + String(now.getMinutes()).padStart(2, '0')
    + String(now.getSeconds()).padStart(2, '0');
  const filename = `seeing-ascii-${ts}.png`;
  asciiCanvas.toBlob((blob) => {
    const file = new File([blob], filename, { type: 'image/png' });
    if (isMobile && navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] });
    } else {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  }, 'image/png');
}

startCamera();

function render() {
  if (!running) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(render); return; }

  const screenW = window.innerWidth * devicePixelRatio;
  const screenH = window.innerHeight * devicePixelRatio;
  const videoAspect = vw / vh;

  const targetFontSize = Math.max(4, Math.floor(screenW / cols / 0.6));
  measureFont(targetFontSize);

  const cellAspect = charW / charH;

  const wA = Math.ceil(screenW / charW);
  const hA = Math.ceil(wA * cellAspect / videoAspect);
  const hB = Math.ceil(screenH / charH);
  const wB = Math.ceil(hB * videoAspect / cellAspect);

  let w, h;
  if (hA * charH >= screenH) { w = wA; h = hA; }
  else { w = wB; h = hB; }

  if (asciiCanvas.width !== screenW || asciiCanvas.height !== screenH) {
    asciiCanvas.width = screenW;
    asciiCanvas.height = screenH;
  }

  sampleCanvas.width = w;
  sampleCanvas.height = h;
  if (mirror) {
    sampleCtx.translate(w, 0);
    sampleCtx.scale(-1, 1);
  }
  sampleCtx.drawImage(video, 0, 0, w, h);
  if (mirror) sampleCtx.setTransform(1, 0, 0, 1, 0, 0);

  const imageData = sampleCtx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const len = charset.length;

  outCtx.fillStyle = '#0a0a0f';
  outCtx.fillRect(0, 0, screenW, screenH);
  outCtx.font = `bold ${fontSize}px ${FONT_FAMILY}`;
  outCtx.textBaseline = 'top';

  const offsetX = (screenW - w * charW) / 2;
  const offsetY = (screenH - h * charH) / 2;

  for (let y = 0; y < h; y++) {
    const py = offsetY + y * charH;
    if (py + charH < 0 || py > screenH) continue;
    for (let x = 0; x < w; x++) {
      const px = offsetX + x * charW;
      if (px + charW < 0 || px > screenW) continue;
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const charIdx = Math.floor(brightness * (len - 1));
      const ch = charset[charIdx];
      if (ch === ' ') continue;

      outCtx.fillStyle = `rgb(${r},${g},${b})`;
      outCtx.fillText(ch, px, py);
    }
  }

  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsCounter.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(render);
}
</script>

</body>
</html>
