<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seeing ASCII</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #c8c8d0;
      font-family: monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    #start-screen h1 {
      font-size: 2rem;
      color: #e0e0e8;
      letter-spacing: 4px;
    }

    #start-screen p {
      color: #666;
      font-size: 0.9rem;
    }

    #start-btn {
      background: none;
      border: 1px solid #444;
      color: #c8c8d0;
      font-family: monospace;
      font-size: 1.1rem;
      padding: 12px 32px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
    }

    #start-btn:hover {
      border-color: #888;
      color: #fff;
      background: #1a1a2f;
    }

    #ascii-container {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #ascii-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 10;
      background: rgba(10, 10, 15, 0.85);
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #222;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #ascii-container:hover #controls {
      opacity: 1;
    }

    #controls label {
      font-size: 0.75rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #controls input[type="range"] {
      width: 80px;
      accent-color: #666;
    }


    #fps-counter {
      position: fixed;
      top: 8px;
      right: 12px;
      font-size: 0.7rem;
      color: #444;
      z-index: 10;
    }

    video { display: none; }
    #sample-canvas { display: none; }
  </style>
</head>
<body>

<div id="start-screen">
  <h1>SEEING ASCII</h1>
  <p>live camera to ascii conversion</p>
  <button id="start-btn">[ START CAMERA ]</button>
</div>

<div id="ascii-container">
  <canvas id="ascii-canvas"></canvas>
  <div id="controls">
    <label>resolution
      <input type="range" id="res-slider" min="40" max="220" value="120">
    </label>
  </div>
  <div id="fps-counter"></div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="sample-canvas"></canvas>

<script>
const charset = ' .\'`^",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';

const video = document.getElementById('video');
const sampleCanvas = document.getElementById('sample-canvas');
const sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
const asciiCanvas = document.getElementById('ascii-canvas');
const outCtx = asciiCanvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const asciiContainer = document.getElementById('ascii-container');
const startBtn = document.getElementById('start-btn');
const resSlider = document.getElementById('res-slider');
const fpsCounter = document.getElementById('fps-counter');

let cols = 120;
let mirror = true;
let running = false;
let frameCount = 0;
let lastFpsTime = performance.now();

// Measure character dimensions for the chosen font
const FONT_FAMILY = 'Courier New, Courier, monospace';
let charW, charH, fontSize;

function measureFont(size) {
  fontSize = size;
  outCtx.font = `${fontSize}px ${FONT_FAMILY}`;
  charW = outCtx.measureText('M').width;
  charH = fontSize; // line-height = font size
}

resSlider.addEventListener('input', () => { cols = parseInt(resSlider.value); });

startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    startScreen.style.display = 'none';
    asciiContainer.style.display = 'block';
    running = true;
    requestAnimationFrame(render);
  } catch (err) {
    startBtn.textContent = '[ CAMERA ACCESS DENIED ]';
    console.error(err);
  }
});

function render() {
  if (!running) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) { requestAnimationFrame(render); return; }

  const screenW = window.innerWidth * devicePixelRatio;
  const screenH = window.innerHeight * devicePixelRatio;

  const videoAspect = vw / vh;

  // Font size from resolution slider (cols = target columns across screen width)
  const targetFontSize = Math.max(4, Math.floor(screenW / cols / 0.6));
  measureFont(targetFontSize);

  // Use actual measured char dimensions for aspect correction
  const cellAspect = charW / charH;

  // "Cover" mode: pick whichever fit covers both dimensions
  // Option A: fill width exactly, see if height is covered
  const wA = Math.ceil(screenW / charW);
  const hA = Math.ceil(wA * cellAspect / videoAspect);
  // Option B: fill height exactly, see if width is covered
  const hB = Math.ceil(screenH / charH);
  const wB = Math.ceil(hB * videoAspect / cellAspect);

  let w, h;
  if (hA * charH >= screenH) {
    w = wA; h = hA;
  } else {
    w = wB; h = hB;
  }

  // Set output canvas to full resolution
  if (asciiCanvas.width !== screenW || asciiCanvas.height !== screenH) {
    asciiCanvas.width = screenW;
    asciiCanvas.height = screenH;
  }

  // Sample the video at grid resolution
  sampleCanvas.width = w;
  sampleCanvas.height = h;
  if (mirror) {
    sampleCtx.translate(w, 0);
    sampleCtx.scale(-1, 1);
  }
  sampleCtx.drawImage(video, 0, 0, w, h);
  if (mirror) sampleCtx.setTransform(1, 0, 0, 1, 0, 0);

  const imageData = sampleCtx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const len = charset.length;

  // Clear and draw
  outCtx.fillStyle = '#0a0a0f';
  outCtx.fillRect(0, 0, screenW, screenH);
  outCtx.font = `${fontSize}px ${FONT_FAMILY}`;
  outCtx.textBaseline = 'top';

  // Center both axes, clip overflow
  const offsetX = (screenW - w * charW) / 2;
  const offsetY = (screenH - h * charH) / 2;

  for (let y = 0; y < h; y++) {
    const py = offsetY + y * charH;
    if (py + charH < 0 || py > screenH) continue;
    for (let x = 0; x < w; x++) {
      const px = offsetX + x * charW;
      if (px + charW < 0 || px > screenW) continue;
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i + 1], b = data[i + 2];
      const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      const charIdx = Math.floor(brightness * (len - 1));
      const ch = charset[charIdx];
      if (ch === ' ') continue;

      outCtx.fillStyle = `rgb(${r},${g},${b})`;
      outCtx.fillText(ch, px, py);
    }
  }

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    fpsCounter.textContent = frameCount + ' fps';
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(render);
}
</script>

</body>
</html>
